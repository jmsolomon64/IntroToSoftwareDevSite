<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./style.css" rel="stylesheet"></link>
    <title>Interactive Website - Index</title>
</head>
<body>
    <!-- Content -->
    <h1>Texture Creator</h1>
    <div id="textureContent"></div>

    <script type="module">
        import { loadStyles } from "./scripts/style.js";
        import { CanvasControls } from './scripts/draw.js';
        import * as site from "./scripts/site.js";

        loadStyles();
        document.addEventListener('DOMContentLoaded', function() {
            site.renderHeader(site.textureId);
            const contentId = 'textureContent';
            const holder = document.getElementById(contentId);
            const editor = new CanvasControls('textureEditor');
            holder.appendChild(editor.CreateEditor());

        });
    </script>
</body>
</html>
