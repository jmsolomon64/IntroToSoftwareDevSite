<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./style.css" rel="stylesheet"></link>
    <title>Interactive Website</title>
</head>
<body>
    <!-- Content -->
    <h1>Settings</h1>
    <div id="styleSettings"></div>

    <script type="module">
        import { StyleSettings, loadStyles } from "./scripts/style.js";
        import * as site from "./scripts/site.js";
        
        loadStyles();
        document.addEventListener('DOMContentLoaded', function() {
            site.renderHeader(site.settingsId);

            const holderId = 'styleSettings';
            const settingsId = 'styleFields';
            const holder = document.getElementById(holderId);
            const settings = new StyleSettings(settingsId);
            holder.append(settings.CreateStyleSettings());
        });
    </script>
</body>
</html>
